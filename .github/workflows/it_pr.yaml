name: Galaxy Interactive Tool Linting and Tests for push and PR
on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '.github/**'
      - 'deprecated/**'
      - 'docs/**'
      - '*'
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '.github/**'
      - 'deprecated/**'
      - 'docs/**'
      - '*'
env:
  GALAXY_FORK: galaxyproject
  GALAXY_BRANCH: release_25.1
  MAX_CHUNKS: 4
  MAX_FILE_SIZE: 1M
concurrency:
  # Group runs by PR, but keep runs on the default branch separate
  # because we do not want to cancel ToolShed uploads
  group: pr-${{ (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && github.run_number || github.ref }}
  cancel-in-progress: true

jobs:
  changed_files:    
    runs-on: ubuntu-latest  # windows-latest || macos-latest
    name: Test changed-files
    steps: # check out rep
      - uses: actions/checkout@v4

        # find files that are changed compared to master
        # find dockerfiles that have changed and pick first or fail if more are changed
      - name: Get all changed Dockerfiles
        id: changed-dockerfiles
        uses: tj-actions/changed-files@v47 # v47.0.6
        with:
          # Avoid using single or double quotes for multiline patterns
          files: |
            interactive_tools/**/Dockerfile
          dir_names: "true"
          dir_names_max_depth: "2"

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Resolve changed tool metadata
        id: tool-meta
        shell: bash
        run: |
          mapfile -t dirs <<< "${{ steps.changed-dockerfiles.outputs.all_changed_files }}"

          if [[ ${#dirs[@]} -eq 0 ]]; then
            echo "No changed interactive tool directory found."
            exit 1
          fi

          if [[ ${#dirs[@]} -gt 1 ]]; then
            echo "More than one changed interactive tool directory found:"
            printf '%s\n' "${dirs[@]}"
            exit 1
          fi

          changed_dir="${dirs[0]}"
          image_name="${changed_dir#interactive_tools/}"
          image_name="${image_name,,}"

          echo "changed_dir=${changed_dir}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${changed_dir}/Dockerfile" >> "$GITHUB_OUTPUT"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
  
        # built docker image locally using the action from eu repo
      - name: Build docker image
        uses: docker/build-push-action@v4
        with:
          push: false
          file: ${{ steps.tool-meta.outputs.dockerfile }}
          tags: recetox/${{ steps.tool-meta.outputs.image_name }}:latest

    # use planemo to run the tests for interactivetool
