<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .plot-container .plotly-graph-div {
            width: 100% !important;
            min-width: 0 !important;
        }
        #cluster-search-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #2c3e50;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        #cluster-search-bar label {
            color: white;
            font-size: 14px;
            white-space: nowrap;
        }
        #cluster-input {
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            font-size: 14px;
            width: 220px;
        }
        #cluster-btn, #cluster-reset-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        #cluster-btn { background: #3498db; color: white; }
        #cluster-reset-btn { background: #e74c3c; color: white; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        header h1 {
            margin: 0;
            font-size: 28px;
        }
        header p {
            margin: 10px 0 0 0;
            font-size: 14px;
            opacity: 0.9;
        }
        #plots-container {
            max-width: 100%;
            margin: 0 auto;
        }
        .chunk-section {
            background-color: white;
            margin-bottom: 60px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .chunk-title {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #3498db;
        }
        .plot-container {
            width: 100%;
        }
        footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            color: #666;
            font-size: 12px;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{ title }}</h1>
    </header>

    {% if is_clustered %}
    <div id="cluster-search-bar">
        <label>Highlight clusters:</label>
        <input type="text" id="cluster-input" placeholder="e.g. 1, 3-5, 10" />
        <button id="cluster-btn">Highlight</button>
        <button id="cluster-reset-btn">Reset</button>
    </div>
    {% endif %}

    <div id="plots-container">
        {% for i in range(total_chunks) %}
        <div class="chunk-section">
            <div class="chunk-title">Chunk {{ i + 1 }}</div>
            <div class="plot-container" id="chunk-{{ i }}"></div>
        </div>
        {% endfor %}
    </div>

    <footer>
        <p>Generated with Plotly</p>
    </footer>

    <script>
        // Data injected safely via Jinja
        const figureData = {{ figure_data | tojson }};
        const traceMapData = {{ trace_maps_data | tojson }};
        const isClustered = {{ is_clustered | tojson }};

        console.log('Loaded', Object.keys(figureData).length, 'figures');

        const plots = {};
        const plotCount = Object.keys(figureData).length;
        let isUpdatingZoom = false;

        function renderAllPlots() {
            for (let i = 0; i < plotCount; i++) {
                const container = document.getElementById('chunk-' + i);
                const plotData = figureData[String(i)];

                if (!plotData) {
                    console.error('Plot data not found for chunk', i + 1);
                    continue;
                }

                const config = { responsive: true, displayModeBar: true };
                Plotly.newPlot(container, plotData.data, plotData.layout, config);
                plots[i] = container;

                // Add event listener for zooming
                container.on('plotly_relayout', function(data) {
                    if (isUpdatingZoom) return;

                    let x0, x1, y0, y1;
                    let autorangeX = false, autorangeY = false;

                    for (const key in data) {
                        if (key.match(/^xaxis\d*\.range\[0\]$/)) x0 = data[key];
                        if (key.match(/^xaxis\d*\.range\[1\]$/)) x1 = data[key];
                        if (key.match(/^yaxis\d*\.range\[0\]$/)) y0 = data[key];
                        if (key.match(/^yaxis\d*\.range\[1\]$/)) y1 = data[key];
                        if (key.match(/^xaxis\d*\.autorange$/)) autorangeX = true;
                        if (key.match(/^yaxis\d*\.autorange$/)) autorangeY = true;
                    }

                    const update = {};
                    if (x0 !== undefined && x1 !== undefined) {
                        update['xaxis.range[0]'] = x0;
                        update['xaxis.range[1]'] = x1;
                    } else if (autorangeX) {
                        update['xaxis.autorange'] = true;
                    }

                    if (y0 !== undefined && y1 !== undefined) {
                        update['yaxis.range[0]'] = y0;
                        update['yaxis.range[1]'] = y1;
                    } else if (autorangeY) {
                        update['yaxis.autorange'] = true;
                    }

                    if (Object.keys(update).length > 0) {
                        isUpdatingZoom = true;
                        const promises = [];
                        for (let j = 0; j < plotCount; j++) {
                            if (j !== i) {
                                promises.push(Plotly.relayout(plots[j], update));
                            }
                        }
                        Promise.all(promises).then(() => {
                            isUpdatingZoom = false;
                        }).catch(err => {
                            console.error("Zoom sync error: ", err);
                            isUpdatingZoom = false;
                        });
                    }
                });
                console.log('Rendered chunk', i + 1);
            }
        }

        function parseClusterInput(raw) {
            const ids = new Set();
            raw.split(',').forEach(part => {
                part = part.trim();
                const range = part.match(/^(\d+)\s*-\s*(\d+)$/);
                if (range) {
                    const lo = parseInt(range[1]), hi = parseInt(range[2]);
                    for (let x = lo; x <= hi; x++) ids.add(x);
                } else if (/^\d+$/.test(part)) {
                    ids.add(parseInt(part));
                }
            });
            return ids;
        }

        function highlightClusters(clusterIds) {
            for (let chunkIdx = 0; chunkIdx < plotCount; chunkIdx++) {
                const container = plots[chunkIdx];
                const traceMap = traceMapData[String(chunkIdx)];
                if (!container || !traceMap) continue;

                const plotData = container.data;
                const resetUpdate = {};

                Object.entries(traceMap).forEach(([subplotIdx, traceIndices]) => {
                    const aboveTrace = plotData[traceIndices.above];
                    if (aboveTrace && aboveTrace.customdata) {
                        const n = aboveTrace.customdata.length;
                        const colors = new Array(n);
                        const sizes = new Array(n);

                        for (let p = 0; p < n; p++) {
                            const cid = aboveTrace.customdata[p][0];
                            const match = clusterIds.has(cid);
                            colors[p] = match ? 'red' : 'lightgray';
                            sizes[p] = match ? 8 : 4;
                        }

                        resetUpdate[`data[${traceIndices.above}].marker.color`] = colors;
                        resetUpdate[`data[${traceIndices.above}].marker.size`] = sizes;
                    }
                    resetUpdate[`data[${traceIndices.below}].marker.opacity`] = 0.05;
                });

                Plotly.restyle(container, resetUpdate);
            }
        }

        function resetHighlight() {
            for (let chunkIdx = 0; chunkIdx < plotCount; chunkIdx++) {
                const container = plots[chunkIdx];
                const traceMap = traceMapData[String(chunkIdx)];
                if (!container || !traceMap) continue;

                const plotData = container.data;
                const resetUpdate = {};

                Object.entries(traceMap).forEach(([subplotIdx, traceIndices]) => {
                    const aboveTrace = plotData[traceIndices.above];
                    if (aboveTrace && aboveTrace.customdata) {
                        const n = aboveTrace.customdata.length;
                        resetUpdate[`data[${traceIndices.above}].marker.size`] = new Array(n).fill(5);
                        resetUpdate[`data[${traceIndices.above}].marker.opacity`] = new Array(n).fill(0.75);
                    }
                    resetUpdate[`data[${traceIndices.below}].marker.opacity`] = 0.7;
                });

                Plotly.restyle(container, resetUpdate);
            }
            document.getElementById('cluster-input').value = '';
        }

        if (isClustered) {
            document.getElementById('cluster-btn').addEventListener('click', () => {
                const raw = document.getElementById('cluster-input').value;
                const ids = parseClusterInput(raw);
                if (ids.size > 0) highlightClusters(ids);
            });

            document.getElementById('cluster-reset-btn').addEventListener('click', resetHighlight);

            document.getElementById('cluster-input').addEventListener('keydown', e => {
                if (e.key === 'Enter') document.getElementById('cluster-btn').click();
            });
        }

        window.addEventListener('load', renderAllPlots);
        if (document.readyState === 'complete') {
            renderAllPlots();
        }
    </script>
</body>
</html>
