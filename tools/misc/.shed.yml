owner: recetox
remote_repository_url: "https://github.com/RECETOX/galaxytools/tree/master/tools/misc"
homepage_url: "https://github.com/RECETOX/galaxytools"
categories:
  - Metabolomics
repositories:
  use_theoretical_mz_annotations:
    description: "use theoretical m/z values from peak annotations"
    long_description: |
      "Overwrite experimentally measured mz values for peaks with theoretical values from peak comments."
    include:
      - use_theoretical_mz_annotations.xml
      - use_theoretical_mz_annotations.py
      - macros.xml
      - test-data
  target_screen:
    description: "Extract peaks from recetox-aplcms tables using a list of target ions"
    long_description: |
      "Extract peaks from recetox-aplcms tables using a list of target ions. MZ and RT tolerances are used to find matching features."
    include:
      - target_screen.xml
      - target_screen.py
      - test-data
  stratified_block_randomization:
    description: "Assigns samples into study blocks of a fixed size while hierarchically balancing selected metadata factors."
    long_description: |
      "This tool divides samples into user-defined blocks and balances their distribution across one or more metadata factors in a hierarchical manner.
      It ensures that the first factor is balanced across all blocks, with subsequent factors balanced within nested levels using proportional allocation and integer rounding.
      The output includes the original data augmented with block assignments, positions within blocks, and optional summary statistics for verification."
    include:
      - stratified_block_randomization.xml
      - stratified_block_randomization.py
      - test-data